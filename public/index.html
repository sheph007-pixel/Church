<script type="text/babel" data-presets="react">

// Shared team access code. Everyone uses the same code; the email
// is what identifies WHO you are (and gates access — must be on the team).
const ACCESS_CODE = '4601';
const APP_VERSION = 'v2.0 · Jun 4 2026';
// An Active opportunity with no activity for this many days auto-moves to Archived.
const ARCHIVE_AFTER_DAYS = 60;

// Migrate legacy YY-NNN case numbers → permanent 4-digit IDs, and fix any bad dates.
const CASE_NUM_MAP = {
  'c_24001':'4821','c_24002':'7354','c_24003':'2967','c_24004':'5138',
  'c_24005':'8413','c_24006':'3756','c_24007':'5294','c_24008':'6173',
  'c_25001':'6290','c_25002':'1847','c_25003':'9053','c_25004':'4612',
  'c_25005':'7825','c_25006':'3491',
};
// Deacon emails from the Faith PCA deacons email list. Keyed by id (stable)
// and by normalized name (fallback, since live records were renamed in-app —
// e.g. "Tim Smith", "Watkins Youngblood"). Used to backfill any empty email.
const DEACON_EMAILS_BY_ID = {
  tm10: 'hunter@kennion.com',
  tm_ts: 'tsmith24@hotmail.com',
  tm_ca: 'chasealdridge3@gmail.com',
  tm_dc: 'derekcavin@gmail.com',
  tm_js: 'jpshank2@gmail.com',
  tm_jh: 'josiahhelms7@gmail.com',
  tm_kc: 'kcooke@esri.com',
  tm_rs: 'randal@truelightbranding.com',
  tm_wy: 'jwyoungblood800@gmail.com',
};
const DEACON_EMAILS_BY_NAME = {
  'hunter shepherd': 'hunter@kennion.com',
  'hunter kennion': 'hunter@kennion.com',
  'timothy smith': 'tsmith24@hotmail.com',
  'tim smith': 'tsmith24@hotmail.com',
  'chase aldridge': 'chasealdridge3@gmail.com',
  'derek cavin': 'derekcavin@gmail.com',
  'jeremy shank': 'jpshank2@gmail.com',
  'josiah helms': 'josiahhelms7@gmail.com',
  'keith cooke': 'kcooke@esri.com',
  'randal snook': 'randal@truelightbranding.com',
  'watkins y': 'jwyoungblood800@gmail.com',
  'watkins youngblood': 'jwyoungblood800@gmail.com',
};
function migrateTeam(team) {
  if (!Array.isArray(team)) return team;
  return team.map(m => {
    let next = m;
    if (m.id === 'tm10' && m.name === 'Hunter Kennion') {
      next = { ...next, name: 'Hunter Shepherd', initials: 'HS' };
    }
    // Backfill a missing email from the deacons list (don't overwrite edits).
    if (!next.email) {
      const email = DEACON_EMAILS_BY_ID[next.id]
        || DEACON_EMAILS_BY_NAME[(next.name || '').trim().toLowerCase()];
      if (email) next = { ...next, email };
    }
    return next;
  });
}
// Legacy status names → new lifecycle. Paused became Archived (dormant), Closed
// became Completed (done). Applied wherever case data is loaded.
const STATUS_MAP = { paused: 'archived', closed: 'completed' };
function migrateCases(cases) {
  if (!Array.isArray(cases)) return cases;
  return cases.map(c => {
    const mapped = CASE_NUM_MAP[c.id];
    let fixed = mapped ? { ...c, caseNumber: mapped } : c;
    if (STATUS_MAP[fixed.status]) fixed = { ...fixed, status: STATUS_MAP[fixed.status] };
    // Fix 25-006 date if still in 2026
    if (fixed.id === 'c_25006' && fixed.lastActivity && fixed.lastActivity.startsWith('2026')) {
      const notes = (fixed.notes || []).map(n => ({ ...n, date: '2025-08-15T12:00:00.000Z' }));
      return { ...fixed, opened: '2025-08-15T12:00:00.000Z', lastActivity: '2025-08-15T12:00:00.000Z', notes };
    }
    return fixed;
  });
}

function LoginPage3({ team, onLogin }) {
  const [email, setEmail] = React.useState('');
  const [code, setCode] = React.useState('');
  const [error, setError] = React.useState('');

  const submit = (e) => {
    e.preventDefault();
    const clean = email.trim().toLowerCase();
    const member = team.find(m => (m.email || '').trim().toLowerCase() === clean);
    if (!member) {
      setError("We don't recognize that email. Ask your team lead to add you to the team first.");
      return;
    }
    if (code !== ACCESS_CODE) {
      setError("That access code isn't right. It's the shared team code — check with your team lead.");
      return;
    }
    onLogin(member.id);
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <img
            src="https://faith-pca.org/wp-content/uploads/2022/09/faith-presbyterian-logo.svg"
            alt="Faith Presbyterian"
            style={{ height: 52, width: 'auto', maxWidth: 220, display: 'block' }}
            onError={e => {
              e.target.outerHTML = `<svg viewBox="0 0 36 36" width="44" height="44" fill="none"><rect width="36" height="36" rx="9" fill="#0f2447"/><path d="M12 9 H25 V13.5 H17 V16.5 H24 V21 H17 V28 H12 Z" fill="#fff"/></svg>`;
            }}
          />
        </div>
        <h1>Internal Benevolence</h1>
        <form onSubmit={submit}>
          <input value={email}
                 onChange={e => { setEmail(e.target.value); setError(''); }}
                 type="email" placeholder="your@email.com" autoFocus
                 autoComplete="email" />
          <input value={code}
                 onChange={e => { setCode(e.target.value.replace(/\D/g,'').slice(0,4)); setError(''); }}
                 className="pin-input" placeholder="••••" inputMode="numeric"
                 aria-label="Access code" />
          {error && <div className="login-error">{error}</div>}
          <button type="submit" className="submit"
                  disabled={!email.trim() || code.length !== 4}>Sign In</button>
        </form>
      </div>
    </div>
  );
}

function MobileHeader({ selectedCase, onBack, caseCount, syncing, onSignOut }) {
  if (selectedCase) return (
    <div className="mobile-header">
      <button className="icon-btn" style={{ marginLeft: -4 }} onClick={onBack}>
        <Icon name="chevronLeft" size={20} stroke={2} />
      </button>
      <div style={{ flex: 1, minWidth: 0, overflow: 'hidden' }}>
        <div style={{ fontWeight: 600, fontSize: 16.5, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {selectedCase.caseNumber} · {selectedCase.name}
        </div>
      </div>
      <StatusPill3 status={selectedCase.status} />
    </div>
  );
  return (
    <div className="mobile-header">
      <div style={{ fontWeight: 600, fontSize: 16.5, flex: 1 }}>Internal Benevolence</div>
      <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{caseCount} active</div>
      {syncing && <Icon name="refresh" size={14} stroke={1.8} className="spin" />}
      {onSignOut && (
        <button className="icon-btn" style={{ marginLeft: 6 }} title="Sign out" onClick={onSignOut}>
          <Icon name="logOut" size={16} stroke={1.7} />
        </button>
      )}
    </div>
  );
}

function App() {
  const [signedIn, setSignedIn] = React.useState(false);
  const [meId, setMeId] = React.useState(ME_ID);
  const [nav, setNav] = React.useState('active');
  const [selectedId, setSelectedId] = React.useState(null);
  const [cases, setCases] = React.useState(CASES);
  const [team, setTeam] = React.useState(TEAM);
  const [events, setEvents] = React.useState(() => seedEvents());
  const [sync, setSync] = React.useState(null); // { lastSyncedTs }
  // Admin area (Deacons, Activity Log, Monthly Report, GroupMe Sync) is password
  // gated. Unlocking persists for the browser session.
  const [adminUnlocked, setAdminUnlocked] = React.useState(() => {
    try { return sessionStorage.getItem('ib_admin_unlocked') === '1'; } catch (e) { return false; }
  });
  // Live build/version for the footer (version + accurate deploy date & time).
  const [buildInfo, setBuildInfo] = React.useState(null);
  React.useEffect(() => {
    fetch('/api/version').then(r => r.ok ? r.json() : null).then(d => { if (d) setBuildInfo(d); }).catch(() => {});
  }, []);
  const versionLabel = buildInfo
    ? `${buildInfo.version} · updated ${fmt3.dateTime(buildInfo.deployedAt)}`
    : APP_VERSION;

  const signOut = () => {
    localStorage.removeItem('ib_session');
    try { sessionStorage.removeItem('ib_admin_unlocked'); } catch (e) {}
    setAdminUnlocked(false);
    setSignedIn(false);
  };
  const [q, setQ] = React.useState('');
  const [newOpen, setNewOpen] = React.useState(false);
  const [syncing, setSyncing] = React.useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(
    () => localStorage.getItem('ib_sidebar_collapsed') === '1'
  );
  React.useEffect(() => {
    localStorage.setItem('ib_sidebar_collapsed', sidebarCollapsed ? '1' : '0');
  }, [sidebarCollapsed]);

  const [dbLoading, setDbLoading] = React.useState(true);
  React.useEffect(() => {
    (async () => {
      // Load the deacon roster first so anyone (not just the leader) can be
      // matched at the login screen. Case data is NOT loaded until sign-in.
      try {
        const r = await fetch('/api/roster');
        if (r.ok) {
          const { team } = await r.json();
          if (Array.isArray(team) && team.length) setTeam(migrateTeam(team));
        }
      } catch (e) {}
      try {
        const sess = JSON.parse(localStorage.getItem('ib_session') || 'null');
        if (sess && sess.meId) {
          const resp = await fetch('/api/state');
          if (resp.ok) {
            const { state } = await resp.json();
            if (state) {
              if (Array.isArray(state.cases)) setCases(migrateCases(state.cases));
              if (Array.isArray(state.team)) setTeam(migrateTeam(state.team));
              if (Array.isArray(state.events)) setEvents(state.events);
              if (state.sync) setSync(state.sync);
            }
          }
          setMeId(sess.meId);
          setSignedIn(true);
        }
      } catch (e) {}
      setDbLoading(false);
    })();
  }, []);

  // ── System-generated summaries ───────────────────────
  // Stored statically per case: { text, redacted, at, sig, loading }.
  // Regenerated only when a note/task changes (sig change) or manual refresh.
  // Persisted so they survive reloads — the same summary shows on the case
  // page and the (redacted) Monthly Report.
  const [summaries, setSummaries] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ib_summaries_v6') || '{}'); } catch (e) { return {}; }
  });
  React.useEffect(() => {
    localStorage.setItem('ib_summaries_v6', JSON.stringify(summaries));
  }, [summaries]);
  const summariesRef = React.useRef(summaries);
  React.useEffect(() => { summariesRef.current = summaries; }, [summaries]);

  // ── Audit log helper ─────────────────────────────────
  // Every mutation funnels through this. Events are immutable.
  const logEvent = React.useCallback((caseId, kind, detail) => {
    setEvents(es => [{
      id: 'e' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      caseId, at: new Date().toISOString(),
      who: meId, kind, detail: detail || {},
    }, ...es]);
  }, [meId]);

  // Generate (or regenerate) a case's summary + its redacted twin, then store
  // both with a timestamp. Logs to history when it's a real regeneration
  // (manual refresh, or content changed) — not the first lazy fill.
  const ensureSummary = React.useCallback((c, force = false) => {
    const cur = summariesRef.current[c.id];
    const sig = caseSig(c);
    if (!force) {
      if (c.notes.length === 0) return;
      if (cur && cur.loading) return;
      // Up to date only if text AND a redaction list are both present.
      if (cur && cur.sig === sig && cur.text != null && cur.redactions != null) return;
    }
    const hadPrior = !!(cur && cur.text != null);
    const changed = hadPrior && cur.sig !== sig;
    setSummaries(s => ({ ...s, [c.id]: { ...(s[c.id] || {}), loading: true } }));
    (async () => {
      const text = await genCaseSummary(c);
      let redactions = text ? await findRedactions(text) : [];
      // Belt-and-suspenders: always mask the names we already know for this case
      // (contacts + the case display name), so a missed name never prints.
      if (text) {
        const known = [];
        (c.contacts || []).forEach(p => {
          if (p.name) { known.push(p.name); p.name.split(/\s+/).forEach(w => known.push(w)); }
        });
        if (c.name) c.name.split(/\s+/).forEach(w => known.push(w));
        const generic = /^(family|household|the|and|&|mr|mrs|ms|dr|jr|sr|&amp;)$/i;
        const knownClean = known.filter(w => w && w.replace(/[^a-z]/gi, '').length >= 2 && !generic.test(w.replace(/[^a-z]/gi, '')));
        redactions = [...new Set([...(redactions || []), ...knownClean])];
      }
      setSummaries(s => ({
        ...s,
        [c.id]: { text, redactions, at: new Date().toISOString(), sig, loading: false },
      }));
      if (text && (force || changed)) logEvent(c.id, 'summary_generated', { manual: !!force });
    })();
  }, [logEvent]);

  // Keep already-generated summaries automatically up to date: whenever an
  // opportunity's content changes (a deacon adds/edits a note, a GroupMe sync
  // adds one, a task or status changes), regenerate its summary. Bounded to
  // opportunities that already have a summary, and debounced so rapid edits
  // collapse into one regeneration.
  React.useEffect(() => {
    if (!signedIn) return;
    const t = setTimeout(() => {
      cases.forEach(c => {
        const cur = summariesRef.current[c.id];
        if (cur && cur.text != null && !cur.loading && cur.sig !== caseSig(c)) ensureSummary(c);
      });
    }, 1200);
    return () => clearTimeout(t);
  }, [cases, signedIn, ensureSummary]);

  // One-time refresh of EVERY summary to the latest prompt/style. Bumping the
  // cache key (ib_summaries_v6) clears the stale summaries; this pass then
  // proactively regenerates a fresh, concise summary for every opportunity so the
  // case pages and the Monthly Report are all on the new format — not just the
  // ones someone happens to open. ensureSummary is idempotent (skips anything
  // already up to date), so this is cheap on later loads.
  const didRegenAll = React.useRef(false);
  React.useEffect(() => {
    if (!signedIn || dbLoading || didRegenAll.current || !cases.length) return;
    didRegenAll.current = true;
    cases.forEach((c, i) => {
      // light stagger so we don't fire every request in the same instant
      setTimeout(() => ensureSummary(c), i * 150);
    });
  }, [signedIn, dbLoading, cases, ensureSummary]);

  // ── Lifecycle reconcile (keyed on archivedAt) ───────────────────────
  // All three statuses are manually selectable; this pass only automates the
  // inactivity lifecycle:
  //   • Auto-archive:    Active with no activity for ARCHIVE_AFTER_DAYS  → Archived
  //                      (stamp archivedAt = now)
  //   • Auto-reactivate: Archived whose latest activity is AFTER archivedAt
  //                      (i.e. genuinely new since it was archived)       → Active
  //   • Backfill:        Archived with no archivedAt (legacy / migrated Paused)
  //                      → set archivedAt = its last activity (stays archived)
  // Comparing against archivedAt is what lets a MANUAL archive stick: its own
  // lastActivity bump equals archivedAt, so it doesn't count as "after". Completed
  // is never touched. Each real flip is logged as a System status change.
  React.useEffect(() => {
    if (!signedIn || dbLoading) return;
    const cutoff = Date.now() - ARCHIVE_AFTER_DAYS * 86400000;
    const lastMs = c => new Date(caseLastActivity(c)).getTime();
    const toArchive = [], toReactivate = [], toBackfill = [];
    cases.forEach(c => {
      if (c.status === 'active') {
        if (lastMs(c) < cutoff) toArchive.push(c);
      } else if (c.status === 'archived') {
        if (!c.archivedAt) toBackfill.push(c);
        else if (lastMs(c) > new Date(c.archivedAt).getTime()) toReactivate.push(c);
      }
    });
    if (!toArchive.length && !toReactivate.length && !toBackfill.length) return;
    const nowIso = new Date().toISOString();
    const archiveIds = new Set(toArchive.map(c => c.id));
    const reactIds = new Set(toReactivate.map(c => c.id));
    const backfillIds = new Set(toBackfill.map(c => c.id));
    setCases(cs => cs.map(c => {
      if (archiveIds.has(c.id))  return { ...c, status: 'archived', archivedAt: nowIso };
      if (reactIds.has(c.id))    return { ...c, status: 'active', archivedAt: null };
      if (backfillIds.has(c.id)) return { ...c, archivedAt: caseLastActivity(c) };
      return c;
    }));
    const sysFlip = (c, to) => ({
      id: 'e' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      caseId: c.id, at: nowIso, who: 'system', kind: 'status_changed',
      detail: { from: c.status, to, auto: true },
    });
    if (toArchive.length || toReactivate.length) {
      setEvents(es => [
        ...toArchive.map(c => sysFlip(c, 'archived')),
        ...toReactivate.map(c => sysFlip(c, 'active')),
        ...es,
      ]);
    }
  }, [signedIn, dbLoading, cases]);

  // Log sign-in once per session
  React.useEffect(() => {
    if (signedIn) {
      setEvents(es => [{
        id: 'e_signin_' + Date.now(),
        caseId: null, at: new Date().toISOString(),
        who: meId, kind: 'signed_in', detail: { email: (team.find(t => t.id === meId) || {}).email },
      }, ...es]);
    }
  }, [signedIn]);

  const saveTimer = React.useRef(null);
  React.useEffect(() => {
    if (!signedIn) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch('/api/state', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cases, team, events, sync }),
      }).catch(() => {});
    }, 1500);
  }, [cases, team, events, sync, signedIn]);

  React.useEffect(() => {
    const reload = async () => {
      if (!signedIn) return;
      setSyncing(true);
      try {
        const resp = await fetch('/api/state');
        if (resp.ok) {
          const { state } = await resp.json();
          if (state) {
            if (Array.isArray(state.cases)) setCases(migrateCases(state.cases));
            if (Array.isArray(state.team)) setTeam(migrateTeam(state.team));
            if (Array.isArray(state.events)) setEvents(state.events);
            if (state.sync) setSync(state.sync);
          }
        }
      } catch (e) {}
      setSyncing(false);
    };
    const handler = () => { if (document.visibilityState === 'visible') reload(); };
    document.addEventListener('visibilitychange', handler);
    return () => document.removeEventListener('visibilitychange', handler);
  }, [signedIn]);

  const me = team.find(t => t.id === meId);

  // Live id→member index so avatars (Av3) resolve initials + color for every
  // deacon (active or past), not just the bootstrap leader. Assigned during
  // render so children paint with the correct avatars on first frame.
  const membersById = React.useMemo(() => {
    const idx = {};
    team.forEach(m => { idx[m.id] = m; });
    return idx;
  }, [team]);
  window.MEMBERS_BY_ID = membersById;

  // ─── Shareable URLs (hash routing) ───────────────────
  // Every tab and opportunity is reflected in the URL hash — e.g. #/active,
  // #/deacons, #/report, #/sync, #/o/4821 — so a deacon can copy the link and
  // send someone to the exact spot. Hash-based so it works with the SPA and the
  // relative asset paths (no server routes needed).
  const NAV_TO_SLUG = { members: 'deacons', report: 'report', activity: 'activity', sync: 'sync', active: 'active', archived: 'archived', completed: 'completed', all: 'all' };
  const SLUG_TO_NAV = { deacons: 'members', members: 'members', report: 'report', activity: 'activity', sync: 'sync', active: 'active', archived: 'archived', completed: 'completed', all: 'all' };
  const casesRef = React.useRef(cases);
  React.useEffect(() => { casesRef.current = cases; }, [cases]);

  const applyHashRef = React.useRef(() => {});
  applyHashRef.current = () => {
    const raw = (window.location.hash || '').replace(/^#\/?/, '').trim();
    if (!raw) return;
    const [head, arg] = raw.split('/');
    if (head === 'o' && arg) {
      const c = casesRef.current.find(x => x.caseNumber === arg);
      if (c) setSelectedId(c.id);
      return; // unknown number → leave current view untouched
    }
    if (SLUG_TO_NAV[head]) { setSelectedId(null); setNav(SLUG_TO_NAV[head]); }
  };

  // React to shared links / manual hash edits / back-forward.
  React.useEffect(() => {
    if (!signedIn) return;
    const onHash = () => applyHashRef.current();
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, [signedIn]);

  // Apply the incoming hash once data is loaded (handles deep links on open).
  const didInitHash = React.useRef(false);
  React.useEffect(() => {
    if (signedIn && !dbLoading && !didInitHash.current) {
      didInitHash.current = true;
      applyHashRef.current();
    }
  }, [signedIn, dbLoading]);

  // Keep the URL in sync with the current view (silent replace — no history spam).
  React.useEffect(() => {
    if (!signedIn) return;
    const c = selectedId ? cases.find(x => x.id === selectedId) : null;
    const want = c ? '#/o/' + c.caseNumber : '#/' + (NAV_TO_SLUG[nav] || 'active');
    if ((window.location.hash || '') !== want) history.replaceState(null, '', want);
  }, [nav, selectedId, signedIn, cases]);

  // Counts per nav item
  const counts = {
    all:       cases.length,
    active:    cases.filter(c => c.status === 'active').length,
    archived:  cases.filter(c => c.status === 'archived').length,
    completed: cases.filter(c => c.status === 'completed').length,
  };

  let filtered = cases;
  const searching = q.trim().length > 0;
  if (!searching) {
    if (nav === 'active')    filtered = filtered.filter(c => c.status === 'active');
    if (nav === 'archived')  filtered = filtered.filter(c => c.status === 'archived');
    if (nav === 'completed') filtered = filtered.filter(c => c.status === 'completed');
  } else {
    const qq = q.toLowerCase();
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(qq) ||
      c.caseNumber.toLowerCase().includes(qq) ||
      c.notes.some(n => n.text.toLowerCase().includes(qq)) ||
      c.tasks.some(t => t.text.toLowerCase().includes(qq)) ||
      c.contacts.some(p => p.name.toLowerCase().includes(qq) || (p.email||'').toLowerCase().includes(qq) || (p.phone||'').includes(qq)) ||
      c.careTeam.some(p => p.name.toLowerCase().includes(qq) || (p.email||'').toLowerCase().includes(qq) || (p.phone||'').includes(qq) || (p.role||'').toLowerCase().includes(qq))
    );
  }
  // Sorting is handled inside CaseList3 so the user can change it per-view.

  const titleMap = {
    all: 'All Opportunities',
    active: 'Active Opportunities', archived: 'Archived', completed: 'Completed',
  };

  // ─── Actions ──────────────────────────────────────────
  const stamp = () => new Date().toISOString();

  const addNote = (cid, text) => {
    setCases(cs => cs.map(c => c.id !== cid ? c : {
      ...c,
      notes: [{ id: 'n' + Date.now(), author: meId, date: stamp(), text }, ...c.notes],
      lastActivity: stamp(),
    }));
    logEvent(cid, 'note_added', { preview: text.slice(0, 80) });
  };
  // Edit an existing note — only the note's own author may edit. Marks the note
  // as edited and logs a note_edited event (with the prior text) for the paper trail.
  // Assign up to 2 deacons to an opportunity (metadata — does not bump lastActivity).
  const setAssignees = (cid, ids) => {
    const next = (ids || []).slice(0, 2);
    setCases(cs => cs.map(c => c.id !== cid ? c : { ...c, assignees: next }));
    logEvent(cid, 'assignees_changed', { ids: next });
  };
  const editNote = (cid, noteId, text) => {
    const c0 = cases.find(c => c.id === cid);
    const n0 = c0 && c0.notes.find(n => n.id === noteId);
    if (!n0 || n0.author !== meId) return;        // author-only guard
    const next = (text || '').trim();
    if (!next || next === n0.text) return;
    setCases(cs => cs.map(c => c.id !== cid ? c : {
      ...c,
      notes: c.notes.map(n => n.id !== noteId ? n : { ...n, text: next, editedAt: stamp() }),
      lastActivity: stamp(),
    }));
    logEvent(cid, 'note_edited', { preview: next.slice(0, 80), prev: n0.text.slice(0, 80) });
  };
  const updateCase = (cid, patch) => {
    const prev = cases.find(c => c.id === cid);
    const t = stamp();
    setCases(cs => cs.map(c => {
      if (c.id !== cid) return c;
      const next = { ...c, ...patch, lastActivity: t };
      // Stamp when a case is archived so auto-reactivate only fires on activity AFTER
      // this point (lets a manual Archive stick). Clear it when leaving Archived.
      if (patch.status === 'archived') next.archivedAt = t;
      else if (patch.status === 'active' || patch.status === 'completed') next.archivedAt = null;
      return next;
    }));
    if (!prev) return;
    // Compute and log diff
    if (patch.name !== undefined && patch.name !== prev.name) {
      logEvent(cid, 'case_renamed', { from: prev.name, to: patch.name });
    }
    if (patch.status !== undefined && patch.status !== prev.status) {
      logEvent(cid, 'status_changed', { from: prev.status, to: patch.status });
    }
    if (patch.careTeam !== undefined) {
      const added   = patch.careTeam.filter(x => !prev.careTeam.includes(x));
      const removed = prev.careTeam.filter(x => !patch.careTeam.includes(x));
      added.forEach(m   => logEvent(cid, 'care_team_added',   { member: m }));
      removed.forEach(m => logEvent(cid, 'care_team_removed', { member: m }));
    }
    if (patch.careTeamNotes !== undefined && patch.careTeamNotes !== prev.careTeamNotes) {
      logEvent(cid, 'care_notes_edited', { preview: patch.careTeamNotes.slice(0, 80) });
    }
  };
  const addTask = (cid, text, due, assignee) => {
    setCases(cs => cs.map(c => c.id !== cid ? c : {
      ...c, tasks: [...c.tasks, { id: 't' + Date.now(), text, done: false, assignee: assignee || meId, due: due || undefined }],
      lastActivity: stamp(),
    }));
    logEvent(cid, 'task_added', { text });
  };
  const toggleTask = (cid, tid) => {
    const c = cases.find(c => c.id === cid);
    const t = c && c.tasks.find(t => t.id === tid);
    if (!t) return;
    setCases(cs => cs.map(c => c.id !== cid ? c : {
      ...c,
      tasks: c.tasks.map(t => t.id === tid ? { ...t, done: !t.done } : t),
      lastActivity: stamp(),
    }));
    logEvent(cid, t.done ? 'task_reopened' : 'task_completed', { text: t.text });
  };
  const deleteTask = (cid, tid) => {
    const c = cases.find(c => c.id === cid);
    const t = c && c.tasks.find(t => t.id === tid);
    setCases(cs => cs.map(c => c.id !== cid ? c : {
      ...c, tasks: c.tasks.filter(t => t.id !== tid), lastActivity: stamp(),
    }));
    if (t) logEvent(cid, 'task_deleted', { text: t.text });
  };
  const createCase = ({ name, firstNote, contact }) => {
    const usedNums = new Set(cases.map(c => c.caseNumber));
    let num;
    do { num = String(Math.floor(Math.random() * 9000) + 1000); } while (usedNums.has(num));
    const id = 'c' + Date.now();
    const contacts = contact && contact.name
      ? [{ id: 'p_' + Date.now(), ...contact }]
      : [];
    const newCase = {
      id, caseNumber: num, name, status: 'active',
      contacts, careTeam: [],
      opened: stamp(), lastActivity: stamp(),
      notes: firstNote.trim()
        ? [{ id: 'n0', author: meId, date: stamp(), text: firstNote.trim() }]
        : [],
      tasks: [], files: [],
    };
    setCases(cs => [newCase, ...cs]);
    logEvent(id, 'case_created', { name });
    if (contacts[0]) logEvent(id, 'contact_added', { name: contacts[0].name });
    if (firstNote.trim()) logEvent(id, 'note_added', { preview: firstNote.trim().slice(0, 80) });
    setNewOpen(false);
    setSelectedId(id);
  };

  // ─── GroupMe Sync: accept handlers (additive only) ───────────────────
  // The note is attributed to the DEACON who said it in GroupMe (resolved from
  // `by`), tagged source:'groupme'. Existing notes are never touched.
  const deaconIdByName = (name) => {
    if (!name) return null;
    const n = name.trim().toLowerCase();
    const m = team.find(t => (t.name || '').trim().toLowerCase() === n);
    return m ? m.id : null;
  };
  const acceptNoteSuggestion = (caseNumber, { text, date, by }) => {
    const target = cases.find(c => c.caseNumber === caseNumber);
    if (!target) return false;
    const noteDate = date ? new Date(date).toISOString() : stamp();
    const author = deaconIdByName(by) || meId;
    setCases(cs => cs.map(c => c.caseNumber !== caseNumber ? c : {
      ...c,
      notes: [{ id: 'n' + Date.now() + Math.random().toString(36).slice(2,6), author, date: noteDate, text, source: 'groupme' }, ...c.notes],
      lastActivity: new Date(noteDate) > new Date(c.lastActivity) ? noteDate : c.lastActivity,
    }));
    logEvent(target.id, 'sync_note_imported', { preview: text.slice(0, 80) });
    return true;
  };
  // Create a new opportunity from a suggestion, opened-dated to the source.
  const acceptNewOpportunity = ({ name, firstNote, date, by }) => {
    const usedNums = new Set(cases.map(c => c.caseNumber));
    let num;
    do { num = String(Math.floor(Math.random() * 9000) + 1000); } while (usedNums.has(num));
    const id = 'c' + Date.now() + Math.random().toString(36).slice(2,5);
    const openedDate = date ? new Date(date).toISOString() : stamp();
    const author = deaconIdByName(by) || meId;
    const newCase = {
      id, caseNumber: num, name: name || 'Untitled', status: 'active',
      contacts: [], careTeam: [],
      opened: openedDate, lastActivity: openedDate,
      notes: (firstNote && firstNote.trim())
        ? [{ id: 'n0_' + id, author, date: openedDate, text: firstNote.trim(), source: 'groupme' }]
        : [],
      tasks: [], files: [],
    };
    setCases(cs => [newCase, ...cs]);
    logEvent(id, 'sync_opportunity_created', { name: newCase.name });
    return num;
  };
  // Record a completed sync (cutoff advance + audit entry).
  const recordSync = ({ lastScanTs, added, created, dismissed }) => {
    setSync({ lastScanTs });
    logEvent(null, 'groupme_synced', { added, created, dismissed });
  };

  // ─── Contacts (people we're helping) ─────────────────
  const addContact = (cid, payload) => {
    const id = 'p_' + Date.now();
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, contacts: [...c.contacts, { id, ...payload }], lastActivity: stamp() }));
    logEvent(cid, 'contact_added', { name: payload.name });
  };
  const editContact = (cid, pid, patch) => {
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, contacts: c.contacts.map(p => p.id === pid ? { ...p, ...patch } : p), lastActivity: stamp() }));
    logEvent(cid, 'contact_edited', { name: patch.name });
  };
  const removeContact = (cid, pid) => {
    const c0 = cases.find(c => c.id === cid);
    const p0 = c0 && c0.contacts.find(p => p.id === pid);
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, contacts: c.contacts.filter(p => p.id !== pid), lastActivity: stamp() }));
    if (p0) logEvent(cid, 'contact_removed', { name: p0.name });
  };

  // ─── Care Team (lay volunteers helping with this case) ───
  const addCareTeam = (cid, payload) => {
    const id = 'ct_' + Date.now();
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, careTeam: [...c.careTeam, { id, ...payload }], lastActivity: stamp() }));
    logEvent(cid, 'careteam_added', { name: payload.name });
  };
  const editCareTeam = (cid, pid, patch) => {
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, careTeam: c.careTeam.map(p => p.id === pid ? { ...p, ...patch } : p), lastActivity: stamp() }));
    logEvent(cid, 'careteam_edited', { name: patch.name });
  };
  const removeCareTeam = (cid, pid) => {
    const c0 = cases.find(c => c.id === cid);
    const p0 = c0 && c0.careTeam.find(p => p.id === pid);
    setCases(cs => cs.map(c => c.id !== cid ? c
      : { ...c, careTeam: c.careTeam.filter(p => p.id !== pid), lastActivity: stamp() }));
    if (p0) logEvent(cid, 'careteam_removed', { name: p0.name });
  };

  const shareToGroupMe = (cid) => {
    const c0 = cases.find(c => c.id === cid);
    if (c0) logEvent(cid, 'shared_to_groupme', { caseNumber: c0.caseNumber, caseName: c0.name });
  };

  const addMember = ({ name, email, phone }) => {
    const id = 'tm' + Date.now();
    const initials = name.split(/\s+/).map(p => p[0]).slice(0,2).join('').toUpperCase();
    const colors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#84cc16','#ec4899'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const newMember = {
      id, name, email, phone, initials, color,
      addedBy: meId, addedAt: new Date().toISOString().slice(0,10), lastLogin: null,
    };
    setTeam(t => [...t, newMember]);
    logEvent(null, 'deacon_invited', { name, email });
  };
  const updateMember = (id, patch) => {
    const prev = team.find(m => m.id === id);
    setTeam(t => t.map(m => m.id === id ? { ...m, ...patch } : m));
    if (prev) logEvent(null, 'deacon_edited', { name: prev.name });
  };
  const removeMember = (id) => {
    const m = team.find(m => m.id === id);
    setTeam(t => t.filter(m => m.id !== id));
    if (m) logEvent(null, 'deacon_removed', { name: m.name });
  };
  const setTeamLeader = (id) => {
    const newLeader = team.find(m => m.id === id);
    const oldLeader = team.find(m => m.isLeader);
    if (!newLeader || newLeader.isLeader) return;
    setTeam(t => t.map(m => ({ ...m, isLeader: m.id === id })));
    logEvent(null, 'team_leader_changed', {
      from: oldLeader ? oldLeader.name : null,
      to: newLeader.name,
    });
  };

  if (dbLoading) return <div className="app-loading">Loading…</div>;
  if (!signedIn) return <LoginPage3 team={team} onLogin={async (id) => {
    try {
      const resp = await fetch('/api/state');
      if (resp.ok) {
        const { state } = await resp.json();
        if (state) {
          if (Array.isArray(state.cases)) setCases(migrateCases(state.cases));
          if (Array.isArray(state.team)) setTeam(migrateTeam(state.team));
          if (Array.isArray(state.events)) setEvents(state.events);
        }
      }
    } catch (e) {}
    localStorage.setItem('ib_session', JSON.stringify({ meId: id, at: new Date().toISOString() }));
    setMeId(id);
    setTeam(t => t.map(m => m.id === id ? { ...m, lastLogin: new Date().toISOString() } : m));
    setSignedIn(true);
  }} />;

  const selected = selectedId ? cases.find(c => c.id === selectedId) : null;

  const ADMIN_NAVS = ['members', 'activity', 'report', 'sync'];
  let main;
  if (selected) {
    const caseEvents = events.filter(e => e.caseId === selected.id);
    main = <CaseDetail3 c={selected} me={me} caseEvents={caseEvents} team={team} onBack={() => setSelectedId(null)}
            onAddNote={addNote} onEditNote={editNote} onUpdate={updateCase}
            onAddTask={addTask} onToggleTask={toggleTask} onDeleteTask={deleteTask}
            onAddContact={addContact} onEditContact={editContact} onRemoveContact={removeContact}
            onAddCareTeam={addCareTeam} onEditCareTeam={editCareTeam} onRemoveCareTeam={removeCareTeam}
            onSetAssignees={setAssignees}
            onShare={shareToGroupMe}
            summaryEntry={summaries[selected.id]}
            onEnsureSummary={ensureSummary}
            onRefreshSummary={(c) => ensureSummary(c, true)}
            onSelectCase={setSelectedId} />;
  } else if (ADMIN_NAVS.includes(nav) && !adminUnlocked) {
    main = <AdminGate onUnlock={() => { sessionStorage.setItem('ib_admin_unlocked', '1'); setAdminUnlocked(true); }}
                      onCancel={() => setNav('active')} />;
  } else if (nav === 'report') {
    main = <PrintPreview3 cases={cases} summaries={summaries} onEnsureSummary={ensureSummary} />;
  } else if (nav === 'activity') {
    main = <ActivityView3 events={events} cases={cases} team={team} onSelectCase={setSelectedId} />;
  } else if (nav === 'members') {
    main = <MembersView team={team} me={me}
              onAddMember={addMember} onUpdateMember={updateMember}
              onRemoveMember={removeMember} onSetLeader={setTeamLeader} />;
  } else if (nav === 'sync') {
    main = <SyncView3 me={me} cases={cases} sync={sync}
              onAcceptNote={acceptNoteSuggestion}
              onAcceptOpportunity={acceptNewOpportunity}
              onRecordSync={recordSync} />;
  } else {
    main = <CaseList3 cases={filtered} onSelect={setSelectedId} summaries={summaries}
              title={searching ? 'Search Results' : titleMap[nav]}
              sub={searching
                ? `${filtered.length} ${filtered.length === 1 ? 'result' : 'results'} across all opportunities`
                : `${filtered.length} ${filtered.length === 1 ? 'opportunity' : 'opportunities'}`}
              q={q} setQ={setQ} onNew={() => setNewOpen(true)}
              nav={nav} counts={counts}
              onNav={(n) => { setNav(n); setSelectedId(null); setQ(''); }}
              onImport={cases.length === 0 ? async (setSeedStatus) => {
                setSeedStatus('loading');
                try {
                  const r = await fetch('/api/seed');
                  const d = await r.json();
                  if (d.ok) {
                    const r2 = await fetch('/api/state');
                    const { state } = await r2.json();
                    if (state) {
                      if (Array.isArray(state.cases)) setCases(migrateCases(state.cases));
                      if (Array.isArray(state.team)) setTeam(migrateTeam(state.team));
                      if (Array.isArray(state.events)) setEvents(state.events);
                            }
                    setSeedStatus('done');
                  } else { setSeedStatus('exists'); }
                } catch(e) { setSeedStatus('error'); }
              } : null} />;
  }

  return (
    <div className="app">
      <MobileHeader selectedCase={selected} onBack={() => setSelectedId(null)}
                    caseCount={counts.active} syncing={syncing} onSignOut={signOut} />
      <Sidebar3
        active={selected ? null : nav}
        onNav={(n) => { setNav(n); setSelectedId(null); }}
        counts={counts}
        onNew={() => setNewOpen(true)}
        me={me}
        adminUnlocked={adminUnlocked}
        versionLabel={versionLabel}
        onSignOut={signOut}
        onSwitchMe={setMeId}
        collapsed={sidebarCollapsed}
        onToggleCollapse={() => setSidebarCollapsed(v => !v)}
      />
      <main className="main">{main}</main>
      {!selected && (
        <div className="mobile-newbar">
          <button className="btn btn-primary mobile-newbtn" onClick={() => setNewOpen(true)}>
            <Icon name="plus" size={16} stroke={2.2} /> New Opportunity
          </button>
        </div>
      )}
      <nav className="mobile-nav">
        <button className={'mobile-nav-item' + (!selected && (nav === 'active' || nav === 'all' || nav === 'archived' || nav === 'completed') ? ' active' : '')}
                onClick={() => { setSelectedId(null); setNav('active'); }}>
          <Icon name="folder" size={20} stroke={1.7} />
          <span>Opportunities</span>
        </button>
        <button className={'mobile-nav-item' + (!selected && nav === 'activity' ? ' active' : '')}
                onClick={() => { setSelectedId(null); setNav('activity'); }}>
          <Icon name="history" size={20} stroke={1.7} />
          <span>Activity</span>
        </button>
        <button className="mobile-nav-item" style={{ flex: '0 0 64px' }} onClick={() => setNewOpen(true)}>
          <div className="mobile-nav-plus"><Icon name="plus" size={22} stroke={2.2} /></div>
        </button>
        <button className={'mobile-nav-item' + (!selected && nav === 'members' ? ' active' : '')}
                onClick={() => { setSelectedId(null); setNav('members'); }}>
          <Icon name="users" size={20} stroke={1.7} />
          <span>Deacons</span>
        </button>
        <button className={'mobile-nav-item' + (!selected && nav === 'report' ? ' active' : '')}
                onClick={() => { setSelectedId(null); setNav('report'); }}>
          <Icon name="print" size={20} stroke={1.7} />
          <span>Report</span>
        </button>
      </nav>
      {newOpen && <NewCase3 onClose={() => setNewOpen(false)} onCreate={createCase} me={me} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
